services:
  postgres:
    image: postgres:16-alpine
    container_name: stock-postgres
    environment:
      POSTGRES_DB: stock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - stock_postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d:ro

  postgrest:
    image: postgrest/postgrest:v12.2.8
    container_name: stock-postgrest
    depends_on:
      - postgres
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: postgres://authenticator:authenticator@postgres:5432/stock
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET:-dev-postgrest-jwt-secret-change-me}

volumes:
  stock_postgres_data:
